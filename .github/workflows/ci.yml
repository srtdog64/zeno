name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Release check
        run: npm run release:check

      - name: WebGL example build
        run: npm run example:webgl:build

      - name: Raw WebGL double-buffer build
        run: npm run example:webgl-raw:build

  browser-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser:
          - chromium
          - firefox

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Browser smoke
        run: xvfb-run -a npm run browser:smoke
        env:
          ZENO_BROWSER: ${{ matrix.browser }}
          ZENO_BROWSER_HEADLESS: "0"
          LIBGL_ALWAYS_SOFTWARE: "1"

      - name: Raw WebGL double-buffer smoke
        run: xvfb-run -a npm run browser:smoke:raw
        env:
          ZENO_BROWSER: ${{ matrix.browser }}
          ZENO_BROWSER_HEADLESS: "0"
          LIBGL_ALWAYS_SOFTWARE: "1"
